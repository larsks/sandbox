name: Release

on:
  push:
    branches:
    - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: main
          noVersionBumpBehavior: silent

      - name: Tag release
        if: ${{ steps.sember.outputs.bump != "none" }}
        run: |
          git tag "${{ steps.semver.outputs.next }}"
          git push --tags

